# GitHub Secret → variable en runtime → bootstrap escribe /app/credentials/gcp-sa.json
# Ejecutar después de configurar secrets y tras cada Redeploy en EasyPanel (si no usas volumen).

name: Sync GCP credentials

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Crear gcp-runtime.env (sin loguear el secreto)
        env:
          GCP_CREDENTIALS_B64: ${{ secrets.GCP_CREDENTIALS_B64 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          python3 <<'PY'
          import base64
          import os
          import sys

          b64 = (os.environ.get("GCP_CREDENTIALS_B64") or "").strip()
          if not b64:
              raw = (os.environ.get("GOOGLE_APPLICATION_CREDENTIALS") or "").strip()
              if not raw:
                  print(
                      "ERROR: Define GCP_CREDENTIALS_B64 o GOOGLE_APPLICATION_CREDENTIALS en GitHub Secrets.",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              b64 = base64.b64encode(raw.encode("utf-8")).decode("ascii")

          # Validar que decodifica a JSON con project_id
          try:
              text = base64.b64decode(b64).decode("utf-8")
              if '"type"' not in text or "service_account" not in text:
                  raise ValueError("no parece JSON de service account")
          except Exception as exc:
              print(f"ERROR: credencial inválida: {exc}", file=sys.stderr)
              sys.exit(1)

          with open("gcp-runtime.env", "w", encoding="utf-8") as f:
              f.write(f"GOOGLE_CREDENTIALS_B64={b64}\n")
          print("OK: gcp-runtime.env generado (1 línea)")
          PY

      - name: Copiar env al Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          source: gcp-runtime.env
          target: /opt/dp-agent-sql-ocean
          overwrite: true

      - name: Inyectar en contenedor y reiniciar
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          script: |
            set -e
            HOST_FILE="/opt/dp-agent-sql-ocean/gcp-runtime.env"
            test -f "$HOST_FILE" || (echo "ERROR: falta $HOST_FILE" && exit 1)

            CONTAINER="${{ secrets.DOCKER_CONTAINER_NAME }}"
            if [ -z "$CONTAINER" ]; then
              CONTAINER=$(docker ps --format '{{.Names}}' | grep -Ei 'dp-agent|citibike|sql-ocean' | head -n1)
            fi
            if [ -z "$CONTAINER" ]; then
              echo "ERROR: no se encontró contenedor. Define DOCKER_CONTAINER_NAME o revisa:"
              docker ps --format '{{.Names}}'
              exit 1
            fi

            docker cp "$HOST_FILE" "$CONTAINER:/app/.env.gcp"
            docker exec "$CONTAINER" chmod 600 /app/.env.gcp
            docker restart "$CONTAINER"
            echo "OK: credenciales en $CONTAINER:/app/.env.gcp — contenedor reiniciado"
